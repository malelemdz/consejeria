<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#402097">
    <link rel="icon" type="image/png" href="images/logo/favicon.png">
    <title>Ministerio de Consejería - Iglesia Bolívar</title>
    <meta name="description" content="Encuentra el apoyo espiritual y emocional que necesitas en la Iglesia Bolívar. Nuestros consejeros están listos para escucharte.">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css?v=1.5">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="logo-container">
                <img src="images/logo/logo.png" alt="Logo">
            </div>
            <div class="header-text">
                <h1>Ministerio de Consejería</h1>
                <p class="church-name">Iglesia Bolívar</p>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Barra de búsqueda y Filtros -->
        <section class="filters-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar consejero o tema...">
                <div id="searchIconContainer" class="search-icon-container">
                    <i data-lucide="search" id="searchIcon"></i>
                </div>
            </div>
            
            <div class="filter-group">
                <label>Grupos de atención:</label>
                <div class="tags-container" id="categoryFilters">
                    <!-- Los filtros se cargarán dinámicamente -->
                </div>
            </div>
        </section>

        <!-- Lista de Consejeros -->
        <section id="counselorsGrid" class="counselors-grid">
            <!-- Cargando... -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Cargando consejeros...</p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; <span id="currentYear"></span> Ministerio de Consejería - Iglesia Bolívar.</p>
    </footer>

    <!-- Modal de Confirmación -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon-box" id="modalIcon">
                <i data-lucide="help-circle"></i>
            </div>
            <h3 id="modalTitle">¿Estás seguro?</h3>
            <p id="modalMessage">¿Quieres realizar esta acción?</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="btnCancel">Cancelar</button>
                <button class="modal-btn modal-btn-confirm" id="btnConfirm">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
